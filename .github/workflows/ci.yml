name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  core-api:
    name: Core API (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cowork/core_api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (locked)
        run: uv sync --locked --group dev

      - name: Ruff
        run: uv run ruff check app tests --extend-ignore E402

      - name: Pytest
        run: uv run python -m pytest tests/ -v
        env:
          SKILL_BENCHMARK_EMIT_ARTIFACTS: "true"

  orchestrator:
    name: Orchestrator (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cowork/orchestrator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (locked)
        run: uv sync --locked --group dev

      - name: Ruff
        run: uv run ruff check app tests --extend-ignore E402,F401

      - name: Pytest
        run: uv run python -m pytest tests/ -v

      - name: Upload skill benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-skill-benchmarks
          path: |
            cowork/orchestrator/tests/skill_benchmarks/report.json
            cowork/orchestrator/tests/skill_benchmarks/history.json
          if-no-files-found: warn

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cowork/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cowork/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
